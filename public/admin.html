<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;900&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <div class="grain"></div>

    <main class="container page-stack">
      <header class="panel animate-up">
        <p class="kicker">ADMIN PANEL</p>
        <h1>Gestiona tu contenido</h1>
        <p class="hero-text">Crea, elimina y actualiza redes, addons y texturas.</p>
        <div class="hero-actions">
          <a class="btn" href="./index.html">Volver al sitio publico</a>
        </div>
      </header>

      <section class="admin-grid animate-up delay-1">
        <article class="panel">
          <div class="section-head">
            <h2>Panel de Redes Sociales</h2>
            <p class="section-sub">Publica tus perfiles oficiales.</p>
          </div>

          <form id="social-form" class="form-grid">
            <div>
              <label for="platform">Plataforma</label>
              <input id="platform" name="platform" required />
            </div>
            <div>
              <label for="url">URL</label>
              <input id="url" name="url" type="url" required />
            </div>
            <div>
              <label for="icon">Icono (opcional)</label>
              <input id="icon" name="icon" placeholder="fa-brands fa-instagram" />
            </div>
            <button type="submit" class="btn">Guardar red social</button>
          </form>

          <div class="section-head top-gap">
            <h3>Listado</h3>
          </div>
          <div id="admin-social-list" class="card-grid list-zone"></div>
        </article>

        <article class="panel">
          <div class="section-head">
            <h2>Subir Addon / Textura</h2>
            <p class="section-sub">Sube el archivo y opcionalmente una imagen de portada.</p>
          </div>

          <form id="asset-form" class="form-grid" enctype="multipart/form-data">
            <div>
              <label for="type">Tipo</label>
              <select id="type" name="type" required>
                <option value="addon">Addon</option>
                <option value="texture">Textura</option>
              </select>
            </div>

            <div>
              <label for="title">Titulo</label>
              <input id="title" name="title" required />
            </div>

            <div>
              <label for="description">Descripcion (opcional)</label>
              <textarea id="description" name="description"></textarea>
            </div>

            <div>
              <label for="file">Archivo para descargar (obligatorio)</label>
              <input id="file" name="file" type="file" required />
            </div>

            <div>
              <label for="image">Imagen de portada (opcional)</label>
              <input id="image" name="image" type="file" accept="image/*" />
            </div>

            <button type="submit" class="btn">Guardar recurso</button>
          </form>

          <div class="section-head top-gap">
            <h3>Listado de recursos</h3>
          </div>
          <div id="admin-assets-list" class="card-grid list-zone"></div>
        </article>
      </section>
    </main>

    <script src="./admin.js"></script>
  </body>
</html>
